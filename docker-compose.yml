name: canonical-repo

services:
    postgres:
        image: postgres:18.4-alpine3.24
        restart: unless-stopped
        environment:
            POSTGRES_DB: app
            POSTGRES_USER: app
            POSTGRES_PASSWORD: app
        ports:
            - "5439:5432"
        volumes:
            - postgres-data:/var/lib/postgresql
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "app", "-d", "app"]
            interval: 5s
            timeout: 5s
            retries: 10

    # Optional local trace backend + UI. Not started by `db:up` (which names postgres) — run `pnpm trace:up`.
    # Enable tracing by setting OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 in .env. UI: localhost:8080.
    signoz:
        image: signoz/signoz-standalone:latest
        privileged: true
        restart: unless-stopped
        ports:
            - "8080:8080" # UI
            - "4317:4317" # OTLP/gRPC
            - "4318:4318" # OTLP/HTTP
        volumes:
            - signoz-clickhouse:/var/lib/clickhouse
            - signoz-data:/var/lib/signoz

volumes:
    postgres-data:
    signoz-clickhouse:
    signoz-data:
