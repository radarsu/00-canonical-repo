# Workspace = every package one level under a `_`-prefixed group dir (_apps/*, _libs/*, _tools/*).
packages:
  - _*/*

# Native postinstall build scripts are opt-in (pnpm blocks them by default). Only what we run needs one.
allowBuilds:
  '@parcel/watcher': false
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  lmdb: false
  msgpackr-extract: false
  prisma: true

# Single source of truth for dependency versions. Packages reference `catalog:` instead of a literal
# version, so an upgrade happens here once and propagates everywhere. Keep alphabetized within groups.
catalog:
  # Angular (compiler/build tooling pinned one minor behind the framework packages, as Angular ships them)
  '@angular/animations': 21.2.17
  '@angular/build': 21.2.15
  '@angular/cdk': 21.2.14
  '@angular/cli': 21.2.15
  '@angular/common': 21.2.17
  '@angular/compiler': 21.2.17
  '@angular/compiler-cli': 21.2.15
  '@angular/core': 21.2.17
  '@angular/forms': 21.2.17
  '@angular/platform-browser': 21.2.17
  '@angular/router': 21.2.17
  # Tooling
  '@biomejs/biome': 2.5.0
  '@commitlint/cli': 20.1.0
  '@commitlint/config-conventional': 20.0.0
  '@types/bun': 1.3.14
  # @types/node tracks the Node 24 runtime (see useNodeVersion below).
  '@types/node': 24.13.2
  esbuild: 0.28.1
  tslib: 2.8.1
  turbo: 2.9.18
  # Held at 5.9.x — Angular 21's compiler-cli pins typescript to >=5.9 <5.10 (TS 6 is for Angular 22).
  typescript: 5.9.3
  # Backend (Hono + oRPC + Better Auth + Prisma + purenv)
  '@hono/node-server': 2.0.4
  '@orpc/client': 1.14.3
  '@orpc/contract': 1.14.3
  '@orpc/openapi': 1.14.3
  '@orpc/openapi-client': 1.14.3
  '@orpc/server': 1.14.3
  '@prisma/adapter-pg': 7.8.0
  '@prisma/client': 7.8.0
  '@puristic/env': 1.5.0
  better-auth: 1.6.22
  hono: 4.10.4
  pino: 10.3.1
  pino-pretty: 13.1.3
  prisma: 7.8.0
  zod: 4.4.3
  # Frontend design system (PrimeNG + Tailwind)
  '@primeuix/themes': 2.0.3
  '@tailwindcss/postcss': 4.3.1
  primeicons: 7.0.0
  primeng: 21.1.9
  rxjs: 7.8.2
  tailwind-merge: 3.6.0
  tailwindcss: 4.3.1

# zod is a transitive dep of many packages; pin one version tree so contracts + validators agree.
overrides:
  zod: 4.4.3

# Symlink workspace packages into each other's node_modules so runtime resolution (Bun, ng) finds them.
injectWorkspacePackages: true
syncInjectedDepsAfterScripts:
  - build

# pnpm downloads + uses this exact Node for all scripts, so every contributor runs the same runtime.
useNodeVersion: 24.14.0

minimumReleaseAgeExclude:
  - '@puristic/env@1.5.0'
