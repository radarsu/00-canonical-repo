# Workspace = every package one level under a `_`-prefixed group dir (_apps/*, _libs/*, _tools/*).
packages:
  - _*/*

# Native postinstall build scripts are opt-in (pnpm blocks them by default). Only what we run needs one.
allowBuilds:
  '@parcel/watcher': false
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  lmdb: false
  msgpackr-extract: false
  prisma: true
  # Astro's image service. The landing template ships no <Image>, so skip the native build; flip to true if you
  # add image optimization.
  sharp: false
  vue-demi: true

# Single source of truth for dependency versions. Packages reference `catalog:` instead of a literal
# version, so an upgrade happens here once and propagates everywhere. Keep alphabetized within groups.
catalog:
  # Frontend framework + build (Vue + Vite)
  '@tanstack/vue-query': 5.101.2
  '@vitejs/plugin-vue': 6.0.7
  vite: 8.1.2
  vue: 3.5.39
  vue-router: 4.6.4
  vue-tsc: 3.3.6
  # Tooling
  '@commitlint/cli': 20.1.0
  '@commitlint/config-conventional': 20.0.0
  '@types/bun': 1.3.14
  # @types/node tracks the Node 24 runtime (see useNodeVersion below).
  '@types/node': 24.13.2
  esbuild: 0.28.1
  oxlint: 1.72.0
  prettier: 3.9.4
  tslib: 2.8.1
  turbo: 2.9.18
  # Held at 5.9.x (works with vue-tsc 3.x); a bump can be a separate follow-up.
  typescript: 5.9.3
  # Backend (Hono + oRPC + Better Auth + Prisma + purenv)
  '@hono/node-server': 2.0.4
  '@hono/otel': 1.1.2
  '@opentelemetry/api': 1.9.1
  '@opentelemetry/context-async-hooks': 2.7.1
  '@opentelemetry/core': 2.7.1
  '@opentelemetry/exporter-trace-otlp-proto': 0.218.0
  '@opentelemetry/resources': 2.7.1
  '@opentelemetry/sdk-trace-node': 2.7.1
  '@opentelemetry/semantic-conventions': 1.41.1
  '@orpc/client': 1.14.3
  '@orpc/contract': 1.14.3
  '@orpc/openapi': 1.14.3
  '@orpc/openapi-client': 1.14.3
  '@orpc/server': 1.14.3
  '@prisma/adapter-pg': 7.8.0
  '@prisma/client': 7.8.0
  '@puristic/env': 1.5.0
  better-auth: 1.6.22
  hono: 4.10.4
  pino: 10.3.1
  pino-pretty: 13.1.3
  prisma: 7.8.0
  zod: 4.4.3
  # Frontend design system (PrimeVue + Tailwind)
  '@primeuix/themes': 2.0.3
  '@tailwindcss/vite': 4.3.1
  primeicons: 7.0.0
  primevue: 4.5.5
  tailwind-merge: 3.6.0
  tailwindcss: 4.3.1
  # Landing pages (Astro)
  '@astrojs/check': 0.9.4
  '@tailwindcss/postcss': 4.3.1
  astro: 6.3.1

# zod is a transitive dep of many packages; pin one version tree so contracts + validators agree.
overrides:
  zod: 4.4.3

# Symlink workspace packages into each other's node_modules so runtime resolution (Bun, ng) finds them.
injectWorkspacePackages: true
syncInjectedDepsAfterScripts:
  - build

# pnpm downloads + uses this exact Node for all scripts, so every contributor runs the same runtime.
useNodeVersion: 24.18.0

minimumReleaseAgeExclude:
  - '@puristic/env@1.5.0'
  - '@vue/language-core@3.3.6'
  - vite@8.1.2
  - vue-tsc@3.3.6
